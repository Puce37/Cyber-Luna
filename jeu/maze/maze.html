<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Labyrinthe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: radial-gradient(circle at center, #0a0a0a, #000000);
        font-family: "Orbitron", sans-serif;
        color: #00f0ff;
        text-align: center;
        overflow-x: hidden;
      }
      h1 {
        margin-top: 70px;
        font-size: 2.5rem;
        text-shadow:
          0 0 10px #00f0ff,
          0 0 20px #00d0ff;
      }
      canvas {
        margin-top: 20px;
        background: #111;
        border: 3px solid #00f0ff;
        box-shadow: 0 0 20px #00f0ff;
      }
      button {
        margin: 20px;
        padding: 12px 30px;
        font-size: 18px;
        font-weight: 700;
        color: #00f0ff;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        border-radius: 12px;
        cursor: pointer;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }
      button:hover {
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-3px);
      }
      button:active {
        transform: translateY(1px);
      }
      #btn-return {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        font-size: 14px;
        border-radius: 8px;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        user-select: none;
        z-index: 1000;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
      }
      #btn-return:hover {
        color: #fff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-2px);
      }
      #btn-return:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }

      /* Animation victoire */
      #victory-message {
        font-weight: 800;
        font-size: 2.5rem;
        color: #00f0ff;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff,
          0 0 30px #00d0ff;
        animation: glow 2.5s ease-in-out infinite alternate;
        margin-top: 30px;
        display: none;
      }
      @keyframes glow {
        from {
          text-shadow:
            0 0 5px #00f0ff,
            0 0 10px #00f0ff,
            0 0 20px #00e0ff,
            0 0 30px #00d0ff;
        }
        to {
          text-shadow:
            0 0 15px #00ffff,
            0 0 25px #00ffff,
            0 0 35px #00c0ff,
            0 0 45px #00c0ff;
        }
      }
    </style>
  </head>
  <body>
    <button
      id="btn-return"
      onclick="window.location.href = '../choix_jeu.html'"
    >
      ⬅️ Retour
    </button>
    <h1>Labyrinthe</h1>
    <canvas id="maze" width="600" height="600"></canvas>
    <br />
    <div id="victory-message">
      🎉 Bien joué ! Tu as terminé le labyrinthe +10 points ! 🎉
    </div>
    <button onclick="generateMaze()">🔁 Rejouer</button>

    <script src="../../point.js"></script>
    <script src="../../js/maze.js"></script>
  </body>
</html>
