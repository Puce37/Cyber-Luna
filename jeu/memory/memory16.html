<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Memory 16</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e, #0f3460);
        background-size: 400% 400%;
        animation: gradientShift 10s ease infinite;
        color: #ffffff;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(0, 240, 255, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 1;
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: 3rem;
        letter-spacing: 0.15em;
        color: #00f0ff;
        text-transform: uppercase;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff,
          0 0 30px #00d0ff,
          0 0 40px #00c0ff;
        margin-bottom: 20px;
      }

      #game-board {
        display: grid;
        grid-template-columns: repeat(4, 120px);
        grid-gap: 15px;
        justify-content: center;
      }

      .card {
        width: 120px;
        height: 120px;
        perspective: 1000px;
        cursor: pointer;
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
      }

      .card.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 8px;
      }

      .card-back {
        background-image: url("./rio/back.png");
        background-size: cover;
        background-position: center;
      }

      .card-front {
        transform: rotateY(180deg);
        background-color: white;
      }

      .card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
      }

      #message {
        margin-top: 30px;
        font-size: 2rem;
        font-weight: 800;
        color: #00f0ff;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff,
          0 0 30px #00d0ff;
        animation: glow 2.5s ease-in-out infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow:
            0 0 5px #00f0ff,
            0 0 10px #00f0ff,
            0 0 20px #00e0ff,
            0 0 30px #00d0ff;
        }
        to {
          text-shadow:
            0 0 15px #00ffff,
            0 0 25px #00ffff,
            0 0 35px #00c0ff,
            0 0 45px #00c0ff;
        }
      }

      button {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 18px;
        font-weight: 700;
        color: #00f0ff;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        border-radius: 12px;
        cursor: pointer;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        user-select: none;
      }

      button:hover {
        color: #ffffff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-3px);
      }

      button:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }

      /* Bouton retour petit dans le coin */
      #btn-return {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        font-size: 14px;
        border-radius: 8px;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        user-select: none;
        z-index: 1000;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      #btn-return:hover {
        color: #fff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-2px);
      }

      #btn-return:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        opacity: 0;
        animation: fadeInUp 0.5s ease forwards;
      }
    </style>
  </head>
  <body>
    <button id="btn-return" onclick="goToMenu()">⬅️ Retour</button>

    <h1>🟢 Facile</h1>
    <div id="game-board"></div>
    <div id="message"></div>
    <button onclick="restartGame()">🔁 Rejouer</button>

    <script src="../../point.js"></script>
    <script src="../../js/memory16.js"></script>
  </body>
</html>
